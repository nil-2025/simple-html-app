version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: <region>
    REPOSITORY_URI: <account-id>.dkr.ecr.<region>.amazonaws.com/simple-html-app

phases:
  pre_build:
    commands:
      - echo Logging in to ECR
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $REPOSITORY_URI
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)

  build:
    commands:
      - echo Building Docker image
      - docker build -t simple-html-app .
      - docker tag simple-html-app:latest $REPOSITORY_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo Pushing Docker image
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - printf '[{"name":"simple-html-container","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json